version: '3.9'

services:
  mysql:
    image: mysql:8.0
    container_name: foodfinder-db
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    ports:
      - "${DB_PORT}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./foodfinder_schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - foodfinder-network

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: foodfinder-app
    env_file:
      - .env
    environment:
      DATABASE_URL: "mysql://${DB_USER}:${DB_PASSWORD}@mysql:3306/${DB_NAME}"
      DB_HOST: mysql
      NODE_ENV: ${NODE_ENV}
    ports:
      - "3003:3003"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - foodfinder-network
    restart: unless-stopped

volumes:
  mysql_data:
    driver: local

networks:
  foodfinder-network:
    driver: bridge
